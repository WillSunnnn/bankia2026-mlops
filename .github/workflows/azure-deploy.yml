name: Build and Deploy to Azure

# Le pipeline se lance automatiquement quand tu "push" sur TA branche
on:
  push:
    branches:
      - deploiement-azure

# Tes variables Azure
env:
  REGISTRY_NAME: 'bankia2026'
  APP_NAME: 'bankia-app-2026'
  IMAGE_NAME: 'bankia-flask-app'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupérer le code de ton projet
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Se connecter à ton ACR en utilisant les secrets que tu viens d'ajouter
    - name: Log in to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY_NAME }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. Construire la nouvelle image Docker et l'envoyer dans ton coffre-fort (ACR)
    - name: Build and push Docker image
      run: |
        docker build -t ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker push ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 4. Dire à ton App Service de se mettre à jour avec cette nouvelle image
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.APP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}